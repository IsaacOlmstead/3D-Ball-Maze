<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D-Ball-Maze</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      height: 100%;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #ui-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #fullscreen-btn, #tilt-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid #fff;
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay">
      <button id="fullscreen-btn">Fullscreen</button>
      <button id="tilt-btn">Enable Tilt</button>
      <span id="level-label">Level 1</span>
    </div>
  </div>


<!-- Main game script (module) -->
<script type="module" src="js/main.js"></script>


  <!-- Main game (modern module) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
